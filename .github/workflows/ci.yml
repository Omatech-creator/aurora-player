name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tooling
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  build:
    name: Build & import smoke test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install libVLC and Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            vlc libvlc-dev \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libnss3 libxcomposite1 libxdamage1 libxrandr2 \
            libxtst6 libasound2t64 || sudo apt-get install -y libasound2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile all modules
        run: python -m compileall -q main.py player.py backend ui

      - name: Headless import / construction smoke test
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python - <<'PY'
          from PySide6.QtWidgets import QApplication
          from ui.main_window import MainWindow
          app = QApplication([])
          window = MainWindow()
          window.show()
          assert window.menuBar().actions(), "menu bar should be populated"
          window.close()
          print("Smoke test passed: window constructs and tears down cleanly.")
          PY
